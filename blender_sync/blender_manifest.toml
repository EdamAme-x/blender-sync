schema_version = "1.0.0"

id = "blender_sync"
version = "0.1.0"
name = "Blender Sync"
tagline = "P2P real-time collaborative editing"
maintainer = "EdamAme-x"
type = "add-on"

blender_version_min = "5.0.0"

license = ["SPDX:MIT"]

platforms = [
  "macos-arm64",
]

tags = ["3D View", "Pipeline", "System"]

# Wheels are populated by scripts/build_extension.py per platform.
# Top-level (must be BEFORE any [section] tables).

