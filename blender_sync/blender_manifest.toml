  "./wheels/aiortc-1.14.0-py3-none-any.whl",
  "./wheels/av-14.1.0-cp311-cp311-macosx_11_0_arm64.whl",
  "./wheels/base58-2.1.1-py3-none-any.whl",
  "./wheels/cffi-2.0.0-cp311-cp311-macosx_11_0_arm64.whl",
  "./wheels/coincurve-21.0.0-cp311-cp311-macosx_11_0_arm64.whl",
  "./wheels/cryptography-47.0.0-cp311-abi3-macosx_10_9_universal2.whl",
  "./wheels/dnspython-2.8.0-py3-none-any.whl",
  "./wheels/google_crc32c-1.5.0-cp311-cp311-macosx_10_9_universal2.whl",
  "./wheels/ifaddr-0.2.0-py3-none-any.whl",
